<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced QR Code Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
padding:30px;
}

.container{
background:white;
padding:25px;
border-radius:12px;
max-width:520px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select{
width:90%;
padding:10px;
margin:6px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 20px;
margin:8px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#qrcode{
margin-top:20px;
position:relative;
display:inline-block;
}

.frame{
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.frame p{
font-weight:bold;
margin-top:10px;
}

.history{
margin-top:20px;
text-align:left;
}

.history div{
background:#eee;
padding:5px;
margin:3px;
border-radius:4px;
}

</style>
</head>

<body>

<div class="container">

<h2>Advanced QR Code Generator</h2>

<select id="type">
<option value="text">Text / URL</option>
<option value="whatsapp">WhatsApp</option>
<option value="wifi">WiFi</option>
<option value="email">Email</option>
<option value="phone">Phone</option>
<option value="instagram">Instagram</option>
<option value="youtube">YouTube</option>
<option value="upi">UPI Payment</option>
</select>

<input id="data" placeholder="Enter data">

<input type="color" id="color1" value="#000000">
<input type="color" id="color2" value="#2563eb">

<label>Size</label>
<input type="range" id="size" min="150" max="400" value="250">

<input type="file" id="logo">

<br>

<button onclick="generateQR()">Generate QR</button>
<button onclick="downloadQR()">Download QR</button>

<div class="frame">

<div id="qrcode"></div>

<p>SCAN ME</p>

</div>

<div class="history">
<h3>QR History</h3>
<div id="history"></div>
</div>

</div>

<script>

let qr

function generateQR(){

let type=document.getElementById("type").value
let data=document.getElementById("data").value
let color=document.getElementById("color1").value
let size=document.getElementById("size").value

let finalData=data

if(type=="whatsapp"){
finalData="https://wa.me/"+data
}

if(type=="email"){
finalData="mailto:"+data
}

if(type=="phone"){
finalData="tel:"+data
}

if(type=="wifi"){
finalData="WIFI:T:WPA;S:"+data+";;"
}

if(type=="instagram"){
finalData="https://instagram.com/"+data
}

if(type=="youtube"){
finalData="https://youtube.com/"+data
}

if(type=="upi"){
finalData="upi://pay?pa="+data
}

document.getElementById("qrcode").innerHTML=""

qr=new QRCode(document.getElementById("qrcode"),{
text:finalData,
width:size,
height:size,
colorDark:color,
colorLight:"#ffffff",
correctLevel:QRCode.CorrectLevel.H
})

saveHistory(finalData)

setTimeout(addLogo,400)

}

function addLogo(){

let logoInput=document.getElementById("logo")

if(logoInput.files.length==0) return

let img=document.createElement("img")
img.src=URL.createObjectURL(logoInput.files[0])

img.style.width="60px"
img.style.position="absolute"
img.style.left="50%"
img.style.top="50%"
img.style.transform="translate(-50%,-50%)"

let qrDiv=document.getElementById("qrcode")

qrDiv.appendChild(img)

}

function downloadQR(){

let qrCanvas=document.querySelector("#qrcode canvas")

if(!qrCanvas){
alert("Generate QR first")
return
}

let frame=document.querySelector(".frame")

html2canvas(frame).then(canvas=>{

let link=document.createElement("a")
link.download="qr-code.png"
link.href=canvas.toDataURL()
link.click()

})

}

function saveHistory(data){

let history=JSON.parse(localStorage.getItem("qrHistory")) || []

history.unshift(data)

if(history.length>10){
history.pop()
}

localStorage.setItem("qrHistory",JSON.stringify(history))

showHistory()

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("qrHistory")) || []

let div=document.getElementById("history")

div.innerHTML=""

history.forEach(item=>{
let d=document.createElement("div")
d.innerText=item
div.appendChild(d)
})

}

showHistory()

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
