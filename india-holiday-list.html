<!DOCTYPE html>
<html>
<head>
<title>India Holiday List 2026</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:8px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>India Holiday List 2026</h1>

<input type="text" id="search" placeholder="Search Holiday...">

<h3>Indian Government Major Holidays 2026</h3>

<ul id="nationalList"></ul>

<h3>Select State</h3>

<select id="stateSelect">
<option value="">Select State</option>
<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>
<option>Andaman and Nicobar</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli</option>
<option>Daman and Diu</option>
<option>Delhi</option>
<option>Lakshadweep</option>
<option>Puducherry</option>
<option>Ladakh</option>
</select>

<ul id="stateHolidayList"></ul>

</div>

<script>

function getDay(dateString){

const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"]

let d=new Date(dateString)

return days[d.getDay()]

}

const national=[

{date:"2026-01-26",name:"Republic Day"},
{date:"2026-03-14",name:"Holi"},
{date:"2026-03-30",name:"Ram Navami"},
{date:"2026-04-03",name:"Good Friday"},
{date:"2026-05-01",name:"Labour Day"},
{date:"2026-08-15",name:"Independence Day"},
{date:"2026-10-02",name:"Gandhi Jayanti"},
{date:"2026-10-24",name:"Diwali"},
{date:"2026-12-25",name:"Christmas"}

]

const states={

"Gujarat":[
{date:"2026-01-14",name:"Uttarayan"},
{date:"2026-08-19",name:"Janmashtami"},
{date:"2026-10-24",name:"Diwali"}
],

"Maharashtra":[
{date:"2026-02-19",name:"Shivaji Jayanti"},
{date:"2026-04-14",name:"Ambedkar Jayanti"},
{date:"2026-10-24",name:"Diwali"}
],

"Rajasthan":[
{date:"2026-03-14",name:"Holi"},
{date:"2026-04-03",name:"Good Friday"},
{date:"2026-10-24",name:"Diwali"}
],

"Uttar Pradesh":[
{date:"2026-03-30",name:"Ram Navami"},
{date:"2026-07-29",name:"Muharram"},
{date:"2026-10-24",name:"Diwali"}
],

"Tamil Nadu":[
{date:"2026-01-15",name:"Pongal"},
{date:"2026-04-14",name:"Tamil New Year"},
{date:"2026-10-24",name:"Diwali"}
],

"Andhra Pradesh":[
{date:"2026-01-14",name:"Sankranti"},
{date:"2026-03-30",name:"Ugadi"},
{date:"2026-10-24",name:"Diwali"}
],

"Karnataka":[
{date:"2026-01-14",name:"Makara Sankranti"},
{date:"2026-04-14",name:"Ugadi"},
{date:"2026-10-24",name:"Diwali"}
],

"West Bengal":[
{date:"2026-03-14",name:"Dol Purnima"},
{date:"2026-10-20",name:"Durga Puja"},
{date:"2026-10-24",name:"Diwali"}
]

}

function showNational(){

let ul=document.getElementById("nationalList")

national.forEach(h=>{

let day=getDay(h.date)

let li=document.createElement("li")

li.textContent=`${h.date} - ${day} - ${h.name}`

ul.appendChild(li)

})

}

showNational()

document.getElementById("stateSelect").addEventListener("change",function(){

let state=this.value

let ul=document.getElementById("stateHolidayList")

ul.innerHTML=""

if(states[state]){

states[state].forEach(h=>{

let day=getDay(h.date)

let li=document.createElement("li")

li.textContent=`${h.date} - ${day} - ${h.name}`

ul.appendChild(li)

})

}

})

</script>

</body>
</html>
