<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udhaar Manager App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px;}
.container{max-width:700px;margin:auto;background:white;padding:15px;border-radius:10px;}
h2{text-align:center;}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;}
button{background:#2563eb;color:white;border:none;}
.card{padding:10px;margin:6px 0;border-radius:6px;}
.red{background:#ffcccc;}
.orange{background:#ffe0b3;}
.green{background:#ccffcc;}
</style>
</head>

<body>

<div class="container">

<h2>💰 Udhaar Manager</h2>

<input id="shopName" placeholder="Shop Name">
<button onclick="saveShop()">Save Shop</button>

<div id="dashboard"></div>

<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile">
<button onclick="addCustomer()">Add Customer</button>

<select id="customerSelect"></select>
<input id="amount" type="number" placeholder="Amount">

<button onclick="addUdhaar()">Add Udhaar</button>
<button onclick="addPayment()">Add Payment</button>

<div id="customerList"></div>

</div>

<!-- INSTALL -->
<div style="text-align:center;margin-top:20px;">
<button id="installBtn" style="display:none;">📱 Install App</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("udhaarData")) || [];

function save(){
localStorage.setItem("udhaarData", JSON.stringify(data));
updateDashboard();
}

function saveShop(){
localStorage.setItem("shopName", shopName.value);
alert("Saved");
}
shopName.value = localStorage.getItem("shopName")||"";

function addCustomer(){
if(!name.value){alert("Enter name");return;}
data.push({name:name.value,mobile:mobile.value,history:[]});
save(); name.value=""; mobile.value="";
showCustomers();
}

function addUdhaar(){
let i=customerSelect.value;
let amt=+amount.value;
if(!amt){alert("Enter amount");return;}

data[i].history.push({
type:"credit",
amt:amt,
date:new Date().toLocaleString()
});

save(); showCustomers();
}

function addPayment(){
let i=customerSelect.value;
let amt=+amount.value;
if(!amt){alert("Enter amount");return;}

data[i].history.push({
type:"paid",
amt:amt,
date:new Date().toLocaleString()
});

save(); showCustomers();
}

function calc(h){
let c=0,p=0;
h.forEach(t=> t.type=="credit"?c+=t.amt:p+=t.amt);
return {c,p,b:c-p};
}

/* DASHBOARD */
function updateDashboard(){
let total=0,paid=0;
data.forEach(c=>{
let r=calc(c.history);
total+=r.c; paid+=r.p;
});
dashboard.innerHTML=`<b>Total:</b> ₹${total}<br>
<b>Paid:</b> ₹${paid}<br>
<b>Balance:</b> ₹${total-paid}`;
}

/* SHOW */
function showCustomers(){
let html="";
let select="";

data.forEach((c,i)=>{
let r=calc(c.history);

let color="green";
if(r.b>1000) color="red";
else if(r.b>0) color="orange";

html+=`<div class="card ${color}">
<b>${c.name}</b><br>
Balance: ₹${r.b}<br>

<button onclick="printReceipt(${i})">🖨 Print</button>
<button onclick="sendWhatsApp(${i})">📲 WhatsApp</button>

</div>`;

select+=`<option value="${i}">${c.name}</option>`;
});

customerList.innerHTML=html;
customerSelect.innerHTML=select;
}

/* PRINT RECEIPT */
function printReceipt(i){
let c=data[i];
let shop=localStorage.getItem("shopName")||"My Shop";

let credit=0,paid=0;
c.history.forEach(t=>{
if(t.type=="credit") credit+=t.amt;
else paid+=t.amt;
});

let bal=credit-paid;

let html=`
<h2>${shop}</h2>
<h3>Udhaar Receipt</h3>
<b>${c.name}</b><br>
<b>${c.mobile||""}</b>
<hr>
Total: ₹${credit}<br>
Paid: ₹${paid}<br>
<b>Balance: ₹${bal}</b>
<br><br>
Signature: ______
`;

let win=window.open('','','width=400,height=600');
win.document.write(`<html><body>${html}</body></html>`);
win.document.close();
win.print();
}

/* WHATSAPP */
function sendWhatsApp(i){
let c=data[i];
let r=calc(c.history);

let msg=`🧾 Udhaar Details

Name: ${c.name}
Balance: ₹${r.b}

Please pay soon 🙏`;

let url="https://wa.me/"+(c.mobile||"")+"?text="+encodeURIComponent(msg);
window.open(url);
}

/* INIT */
showCustomers();
updateDashboard();

/* INSTALL APP */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
e.preventDefault();
deferredPrompt = e;
installBtn.style.display = "block";
});

installBtn.onclick = async () => {
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
}
};

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
