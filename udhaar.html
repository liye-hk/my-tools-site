<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Udhaar Manager</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:10px;}
.dark{background:#111;color:white;}
.container{max-width:700px;margin:auto;background:white;padding:15px;border-radius:10px;}
.dark .container{background:#1f1f1f;}
h2{text-align:center;}

input,select{
width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;
}

button{
width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;
background:#2563eb;color:white;font-size:14px;
}

.smallbtn{width:auto;padding:5px;margin:2px;font-size:12px;}

.card{border:1px solid #ccc;padding:10px;margin:6px 0;border-radius:6px;}
.red{background:#ffcccc;}
.orange{background:#ffe0b3;}
.green{background:#ccffcc;}

table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #000;padding:6px;text-align:center;font-size:13px;}

</style>
</head>

<body>

<div class="container">

<h2>💰 Advanced Udhaar Manager</h2>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<!-- SHOP -->
<input id="shopName" placeholder="Shop Name">
<button onclick="saveShop()">Save Shop</button>

<!-- DASHBOARD -->
<div id="dashboard"></div>

<!-- CUSTOMER -->
<input id="name" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile">
<button onclick="addCustomer()">Add Customer</button>

<!-- SEARCH -->
<input id="search" placeholder="Search" onkeyup="showCustomers()">

<!-- TRANSACTION -->
<select id="customerSelect"></select>
<input id="product" placeholder="Product (optional)">
<input id="amount" type="number" placeholder="Amount">
<input id="dueDate" type="date">

<button onclick="addUdhaar()">Add Udhaar</button>
<button onclick="addPayment()">Add Payment</button>

<!-- FILTER -->
<select id="dateFilter">
<option value="all">Full</option>
<option value="today">Today</option>
<option value="7days">7 Days</option>
</select>

<select id="printType">
<option value="a4">A4</option>
<option value="receipt">Receipt</option>
</select>

<!-- LIST -->
<div id="customerList"></div>

<!-- HISTORY -->
<div id="history"></div>

<!-- ACTION -->
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="backup()">Backup Data</button>
<input type="file" onchange="restore(event)">
<button onclick="clearAll()" style="background:red;">Clear All</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("udhaarData")) || [];

/* SAVE */
function save(){
localStorage.setItem("udhaarData", JSON.stringify(data));
updateDashboard();
}

/* DARK */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* SHOP */
function saveShop(){
localStorage.setItem("shopName", shopName.value);
alert("Saved");
}
shopName.value = localStorage.getItem("shopName")||"";

/* ADD CUSTOMER */
function addCustomer(){
if(!name.value || !mobile.value){alert("Fill");return;}
data.push({name:name.value,mobile:mobile.value,history:[]});
save(); name.value=""; mobile.value="";
showCustomers();
}

/* SELECT */
function updateSelect(){
let html="";
data.forEach((c,i)=> html+=`<option value="${i}">${c.name}</option>`);
customerSelect.innerHTML=html;
}

/* ADD UDHAAR */
function addUdhaar(){
let i=customerSelect.value;
let amt=+amount.value;
let prod=product.value;
let due=dueDate.value;

data[i].history.push({
type:"credit",
amt:amt,
product:prod,
due:due,
date:new Date().toLocaleString()
});

save(); showCustomers();
}

/* ADD PAYMENT */
function addPayment(){
let i=customerSelect.value;
let amt=+amount.value;

data[i].history.push({
type:"paid",
amt:amt,
date:new Date().toLocaleString()
});

save(); showCustomers();
}

/* CALC */
function calc(h){
let c=0,p=0;
h.forEach(t=> t.type=="credit"?c+=t.amt:p+=t.amt);
return {c,p,b:c-p};
}

/* DASHBOARD */
function updateDashboard(){
let totalC=0,totalP=0;

data.forEach(c=>{
let r=calc(c.history);
totalC+=r.c; totalP+=r.p;
});

dashboard.innerHTML=`
<b>Total Udhaar:</b> ₹${totalC}<br>
<b>Total Paid:</b> ₹${totalP}<br>
<b>Balance:</b> ₹${totalC-totalP}
`;
}

/* SHOW */
function showCustomers(){
let s=search.value.toLowerCase();
let html="";

data.forEach((c,i)=>{
if(!c.name.toLowerCase().includes(s)) return;

let r=calc(c.history);

let color="green";
if(r.b>1000) color="red";
else if(r.b>0) color="orange";

html+=`
<div class="card ${color}">
<b>${c.name}</b><br>
Balance: ₹${r.b}<br>

<button class="smallbtn" onclick="viewHistory(${i})">View</button>
<button class="smallbtn" onclick="printReceipt(${i})">Print</button>
<button class="smallbtn" onclick="sendWhatsApp(${i})">WhatsApp</button>
<button class="smallbtn" onclick="deleteCustomer(${i})">Delete</button>
</div>`;
});

customerList.innerHTML=html;
updateSelect();
}

/* HISTORY */
function viewHistory(i){
let h=data[i].history;
let html="<h3>History</h3>";

h.forEach(t=>{
html+=`${t.date} - ${t.product||""} ${t.type=="credit"?"+":"-"}₹${t.amt}<br>`;
});

history.innerHTML=html;
}

/* PRINT */
function printReceipt(i){

let c=data[i];
let shop=localStorage.getItem("shopName")||"My Shop";
let filter=dateFilter.value;
let now=new Date();

let list=c.history.filter(t=>{
let d=new Date(t.date);
if(filter=="today") return d.toDateString()==now.toDateString();
if(filter=="7days") return (now-d)<7*86400000;
return true;
});

let credit=0,paid=0;

let html=`
<h2>${shop}</h2>
<h3>Udhaar Receipt</h3>
<b>${c.name}</b><br><b>${c.mobile}</b><br><hr>
<table>
<tr><th>Date</th><th>Item</th><th>Amt</th></tr>
`;

list.forEach(t=>{
if(t.type=="credit") credit+=t.amt;
else paid+=t.amt;

html+=`<tr>
<td>${t.date}</td>
<td>${t.product||t.type}</td>
<td>₹${t.amt}</td>
</tr>`;
});

let bal=credit-paid;

html+=`
<tr><td colspan="2">Total</td><td>₹${credit}</td></tr>
<tr><td colspan="2">Paid</td><td>₹${paid}</td></tr>
<tr><td colspan="2"><b>Balance</b></td><td><b>₹${bal}</b></td></tr>
</table>
<br>Signature: ______`;

let win=window.open('','','width=400,height=600');

win.document.write(`<html><body>${html}</body></html>`);
win.document.close();
win.print();
}

/* WHATSAPP */
function sendWhatsApp(i){
let r=calc(data[i].history);
let msg=`Hello ${data[i].name}, pending ₹${r.b}`;
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

/* DELETE */
function deleteCustomer(i){
data.splice(i,1); save(); showCustomers();
}

/* CSV */
function downloadCSV(){
let csv="Name,Balance\n";
data.forEach(c=>{
let r=calc(c.history);
csv+=`${c.name},${r.b}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="data.csv";
a.click();
}

/* BACKUP */
function backup(){
let blob=new Blob([JSON.stringify(data)]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

/* RESTORE */
function restore(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=()=>{
data=JSON.parse(reader.result);
save(); showCustomers();
};
reader.readAsText(file);
}

/* CLEAR */
function clearAll(){
localStorage.removeItem("udhaarData");
location.reload();
}

showCustomers();
updateDashboard();

</script>

</body>
</html>
