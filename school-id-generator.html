<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School ID Card Generator</title>

<meta name="description" content="Free School ID Card Generator with PDF download, bulk Excel upload and A4 auto print.">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.card{
width:320px;
height:200px;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
position:relative;
}

.header{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
}

.student-photo{
width:70px;
height:80px;
object-fit:cover;
border:2px solid #000;
}

.info{
font-size:12px;
}

.signature{
width:80px;
position:absolute;
bottom:5px;
right:10px;
}

#qrcode{
position:absolute;
bottom:5px;
left:10px;
}

.templates{
height:120px;
overflow:auto;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
}

.template{
height:40px;
cursor:pointer;
}

.bulk{
margin-top:40px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.a4{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

</style>
</head>

<body>

<h2>School ID Card Generator</h2>

<div class="container">

<div>

<input id="school" placeholder="School Name">

<input id="address" placeholder="School Address">

<input id="name" placeholder="Student Name">

<input id="parent" placeholder="Parent Name">

<input id="class" placeholder="Class">

<input id="section" placeholder="Section">

<input id="roll" placeholder="Roll No">

<input id="year" placeholder="Year">

<label>Student Photo</label>
<input type="file" id="photo">

<label>School Logo</label>
<input type="file" id="logo">

<label>Principal Signature</label>
<input type="file" id="sign">

<button onclick="generate()">
<i class="fa fa-id-card"></i> Generate Preview
</button>

<button onclick="download()">
<i class="fa fa-download"></i> Download ID
</button>

<button onclick="downloadPDF()">
<i class="fa fa-file-pdf"></i> Download PDF
</button>

<button onclick="printCard()">
<i class="fa fa-print"></i> Print
</button>

<button onclick="printA4()">
<i class="fa fa-print"></i> A4 Sheet Print
</button>

<label>Bulk Excel Upload</label>
<input type="file" id="excel">

<button onclick="bulkPrint()">Bulk Print</button>

<h3>Select Template</h3>

<div class="templates" id="templates"></div>

</div>

<div>

<div id="card" class="card">

<div class="header">

<img id="logoPreview" class="logo">

<div>
<b id="schoolPreview"></b>
<br>
<span id="addressPreview"></span>
</div>

</div>

<hr>

<img id="photoPreview" class="student-photo">

<div class="info">

Name : <span id="namePreview"></span><br>

Parent : <span id="parentPreview"></span><br>

Class : <span id="classPreview"></span><br>

Section : <span id="sectionPreview"></span><br>

Roll : <span id="rollPreview"></span><br>

Year : <span id="yearPreview"></span>

</div>

<img id="signPreview" class="signature">

<div id="qrcode"></div>

</div>

</div>

</div>

<div id="bulkCards" class="bulk"></div>

<script>

function readURL(input,preview){

if(input.files && input.files[0]){

let reader=new FileReader()

reader.onload=function(e){

preview.src=e.target.result

}

reader.readAsDataURL(input.files[0])

}

}

photo.onchange=function(){

readURL(this,photoPreview)

}

logo.onchange=function(){

readURL(this,logoPreview)

}

sign.onchange=function(){

readURL(this,signPreview)

}

function generate(){

schoolPreview.innerText=school.value

addressPreview.innerText=address.value

namePreview.innerText=name.value

parentPreview.innerText=parent.value

classPreview.innerText=class.value

sectionPreview.innerText=section.value

rollPreview.innerText=roll.value

yearPreview.innerText=year.value

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{

text:name.value+"-"+roll.value,

width:60,

height:60

})

}

function download(){

html2canvas(card).then(canvas=>{

let a=document.createElement("a")

a.href=canvas.toDataURL()

a.download="id-card.png"

a.click()

})

}

function printCard(){

window.print()

}

for(let i=1;i<=100;i++){

let t=document.createElement("div")

t.className="template"

t.style.background="hsl("+i*3+",70%,70%)"

t.onclick=function(){

card.style.background=this.style.background

}

templates.appendChild(t)

}

excel.onchange=function(e){

let reader=new FileReader()

reader.onload=function(e){

let data=new Uint8Array(e.target.result)

let workbook=XLSX.read(data,{type:'array'})

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let json=XLSX.utils.sheet_to_json(sheet)

generateBulk(json)

}

reader.readAsArrayBuffer(e.target.files[0])

}

function generateBulk(json){

let html=""

json.forEach(s=>{

html+=`

<div class="card">

<b>${s.Name}</b><br>

Parent : ${s.Parent}<br>

Class : ${s.Class}<br>

Section : ${s.Section}<br>

Roll : ${s.Roll}<br>

Year : ${s.Year}

</div>

`

})

bulkCards.innerHTML=html

}

function bulkPrint(){

window.print()

}

function downloadPDF(){

html2canvas(card).then(canvas=>{

let img=canvas.toDataURL("image/png")

const { jsPDF } = window.jspdf

let pdf=new jsPDF('landscape','mm',[86,54])

pdf.addImage(img,'PNG',0,0,86,54)

pdf.save("school-id-card.pdf")

})

}

function printA4(){

html2canvas(card).then(canvas=>{

let img=canvas.toDataURL()

let win=window.open("")

win.document.write("<div class='a4'>")

for(let i=0;i<8;i++){

win.document.write("<img src='"+img+"' width='300'>")

}

win.document.write("</div>")

win.print()

})

}

</script>

</body>
</html>
