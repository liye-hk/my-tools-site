<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Shop Bill Generator</title><script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script><style>

body{
font-family:monospace;
background:#f4f4f4;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
border:1px dashed #000;
padding:6px;
font-size:14px;
}

.bill{
text-align:left;
margin-top:20px;
}

</style></head><body><div class="container"><h2>🧾 Bill Generator</h2><!-- Shop Details --><input id="shop" placeholder="Shop Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone"><button onclick="saveShop()">Save Shop</button>

<br><input id="customer" placeholder="Customer Name"><!-- Item --><input id="product" placeholder="Product Name">
<input id="qty" type="number" placeholder="Qty">
<input id="price" type="number" placeholder="Price"><button onclick="addItem()">Add</button>

<table id="table">
<tr>
<th>No</th>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</table><button onclick="generateBill()">Generate Bill</button>
<button onclick="downloadPDF()">PDF</button>
<button onclick="sendWhatsApp()">WhatsApp</button>

<div id="bill" class="bill"></div><br><button onclick="downloadHistory()">Download History</button>

<div id="totalDay"></div></div><script>

let items=[];
let total=0;

/* SAVE SHOP */

function saveShop(){
localStorage.setItem("shop",shop.value);
localStorage.setItem("address",address.value);
localStorage.setItem("phone",phone.value);
alert("Saved");
}

shop.value=localStorage.getItem("shop")||"";
address.value=localStorage.getItem("address")||"";
phone.value=localStorage.getItem("phone")||"";

/* ADD ITEM */

function addItem(){

let p=product.value;
let q=+qty.value;
let pr=+price.value;

let t=q*pr;

items.push({p,q,pr,t});

let row=table.insertRow();

row.insertCell(0).innerText=items.length;
row.insertCell(1).innerText=p;
row.insertCell(2).innerText=q;
row.insertCell(3).innerText=pr;
row.insertCell(4).innerText=t;

product.value="";
qty.value="";
price.value="";
}

/* BILL */

function generateBill(){

total=0;
items.forEach(i=> total+=i.t);

let date=new Date().toLocaleString();

let html=`
<b>${shop.value}</b><br>
${address.value}<br>
Phone: ${phone.value}<br>
Date: ${date}<br>
Customer: ${customer.value}

<hr>

<table style="width:100%">
<tr><th>No</th><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>
`;

items.forEach((i,index)=>{
html+=`
<tr>
<td>${index+1}</td>
<td>${i.p}</td>
<td>${i.q}</td>
<td>${i.pr}</td>
<td>${i.t}</td>
</tr>`;
});

html+=`</table>

<hr>
<h3>Grand Total: ₹${total}</h3>
`;

bill.innerHTML=html;

/* SAVE HISTORY */

let history=JSON.parse(localStorage.getItem("history"))||[];

history.push({
total:total,
date:date
});

localStorage.setItem("history",JSON.stringify(history));

showTotalDay();

}

/* PDF */

function downloadPDF(){
html2pdf().from(bill).save("bill.pdf");
}

/* WHATSAPP */

function sendWhatsApp(){

let text=bill.innerText;

let url="https://wa.me/?text="+encodeURIComponent(text);

window.open(url);
}

/* HISTORY DOWNLOAD */

function downloadHistory(){

let history=JSON.parse(localStorage.getItem("history"))||[];

let csv="Total,Date\n";

history.forEach(h=>{
csv+=h.total+","+h.date+"\n";
});

let blob=new Blob([csv]);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="history.csv";
a.click();

}

/* TOTAL DAY SALE */

function showTotalDay(){

let history=JSON.parse(localStorage.getItem("history"))||[];

let today=new Date().toLocaleDateString();

let sum=0;

history.forEach(h=>{
if(h.date.includes(today)){
sum+=h.total;
}
});

totalDay.innerHTML="<b>Today's Sale: ₹"+sum+"</b>";

}

showTotalDay();

</script>
</body>
</html>
