<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Weight to Price Calculator - Shayan Smart Tools</title>
<style>
body{
  font-family:Arial,sans-serif; background:#f5f7fa; margin:0; padding:20px; display:flex; justify-content:center;
}
.container{
  width:100%; max-width:500px; background:white; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}
input, select, button{width:100%; padding:10px; margin:10px 0; font-size:16px; border-radius:5px; border:1px solid #ccc;}
button{background:#2b7cff; color:white; border:none; cursor:pointer;}
button:hover{background:#1a5fcc;}
.result{margin-top:15px; padding:10px; background:#eef4ff; border-radius:5px;}
table{width:100%; border-collapse:collapse; margin-top:15px;}
th, td{border:1px solid #ccc; padding:5px; font-size:14px; text-align:left;}
.pdf-btn{margin-top:10px; padding:8px 15px; background:#2b7cff; color:white; border:none; cursor:pointer; border-radius:5px;}
.pdf-btn:hover{background:#1a5fcc;}
</style>
</head>
<body>
<div class="container">
<h2>Weight to Price Calculator</h2>

<input type="number" id="weightInput" placeholder="Enter weight">
<select id="unitSelect">
  <option value="gram">Gram (g)</option>
  <option value="kg">Kilogram (Kg)</option>
  <option value="quintal">Quintal (Qt)</option>
  <option value="ton">Ton</option>
  <option value="pound">Pound (lb)</option>
</select>
<input type="number" id="pricePerKg" placeholder="Price per Kg">
<input type="number" id="pricePerQt" placeholder="Price per Quintal (1 Qt)">

<button onclick="calculatePrice()">Calculate</button>
<div class="result" id="result">Total Price will appear here</div>

<h3>History</h3>
<table id="historyTable">
<thead><tr><th>Date</th><th>Weight</th><th>Unit</th><th>Kg Price</th><th>Qt Price</th><th>Total</th></tr></thead>
<tbody></tbody>
</table>
<button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let historyData=[];
function calculatePrice(){
  const weight=parseFloat(document.getElementById('weightInput').value);
  const unit=document.getElementById('unitSelect').value;
  const pricePerKg=parseFloat(document.getElementById('pricePerKg').value);
  const pricePerQt=parseFloat(document.getElementById('pricePerQt').value);
  if(isNaN(weight)){ alert('Enter valid weight'); return;}
  let weightKg;
  switch(unit){
    case 'gram': weightKg=weight/1000; break;
    case 'kg': weightKg=weight; break;
    case 'quintal': weightKg=weight*100; break;
    case 'ton': weightKg=weight*1000; break;
    case 'pound': weightKg=weight*0.453592; break;
    default: weightKg=weight;
  }
  let totalKg=!isNaN(pricePerKg)?weightKg*pricePerKg:0;
  let totalQt=!isNaN(pricePerQt)?weightKg/100*pricePerQt:0;
  const totalDisplay=`${!isNaN(totalKg)?'₹'+totalKg.toFixed(2):''} ${(!isNaN(totalKg)&&!isNaN(totalQt))?' | ':''}${!isNaN(totalQt)?'₹'+totalQt.toFixed(2)+' (Qt)':''}`;
  document.getElementById('result').innerHTML=totalDisplay;
  const now=new Date();
  historyData.push({
    date:now.toLocaleString(), weight, unit,
    pricePerKg:!isNaN(pricePerKg)?pricePerKg:'-', pricePerQt:!isNaN(pricePerQt)?pricePerQt:'-',
    total:totalDisplay
  });
  updateHistory();
}
function updateHistory(){
  const tbody=document.getElementById('historyTable').querySelector('tbody');
  tbody.innerHTML='';
  historyData.forEach(item=>{
    const row=`<tr><td>${item.date}</td><td>${item.weight}</td><td>${item.unit}</td><td>${item.pricePerKg}</td><td>${item.pricePerQt}</td><td>${item.total}</td
