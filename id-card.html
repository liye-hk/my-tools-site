<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School ID Card Generator</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#e0e7ff,#f1f5f9);
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
padding:10px 18px;
margin:10px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

#card{
width:420px;
height:260px;
border-radius:20px;
margin:30px auto;
position:relative;
background:white;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
overflow:hidden;
}

/* Watermark */
.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0.06;
pointer-events:none;
}
.watermark img{
width:200px;
}

/* Top Bar */
.topbar{
background:#2563eb;
color:white;
padding:10px;
font-weight:bold;
}

.school-name{
font-size:18px;
}

.school-address{
font-size:12px;
}

/* Title Below Blue Bar */
.title{
text-align:center;
font-weight:bold;
font-size:18px;
margin-top:8px;
}

/* Photo */
.photo{
position:absolute;
left:25px;
top:105px;
width:100px;
height:115px;
border:2px solid #ccc;
border-radius:12px;
overflow:hidden;
}
.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* Details */
.details{
position:absolute;
left:150px;
top:105px;
text-align:left;
font-size:14px;
}

.details p{
margin:4px 0;
}

.details strong{
font-weight:bold;
}

/* Signature */
.signature{
position:absolute;
right:15px;
bottom:45px;
text-align:center;
font-size:11px;
}
.signature img{
width:80px;
height:30px;
object-fit:contain;
}

/* Bottom Bar */
.bottombar{
position:absolute;
bottom:0;
width:100%;
background:#2563eb;
color:white;
padding:6px;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h2>School ID Card Generator</h2>

<input id="school" placeholder="School Name">
<input id="address" placeholder="School Address">
<input id="name" placeholder="Student Name">
<input id="father" placeholder="Father Name">
<input id="class" placeholder="Class">
<input id="section" placeholder="Section">
<input id="roll" placeholder="Roll No">
<input id="phone" placeholder="Phone Number">
<input id="session" placeholder="Session (2024-2025)">

<label>School Logo</label>
<input type="file" id="logoUpload">

<label>Student Photo</label>
<input type="file" id="photoUpload">

<label>Principal Signature</label>
<input type="file" id="signUpload">

<button onclick="preview()">Preview</button>
<button onclick="downloadCard()">Download</button>

</div>

<div id="card">

<div class="watermark">
<img id="watermarkLogo">
</div>

<div class="topbar">
<div class="school-name" id="schoolPreview">School Name</div>
<div class="school-address" id="addressPreview">School Address</div>
</div>

<div class="title">IDENTITY CARD</div>

<div class="photo">
<img id="photoPreview">
</div>

<div class="details">
<p><strong>Name :</strong> <span id="namePreview"></span></p>
<p><strong>S/O D/O :</strong> <span id="fatherPreview"></span></p>
<p><strong>Class :</strong> <span id="classPreview"></span></p>
<p><strong>Section :</strong> <span id="sectionPreview"></span></p>
<p><strong>Roll No :</strong> <span id="rollPreview"></span></p>
<p><strong>PH No :</strong> <span id="phonePreview"></span></p>
</div>

<div class="signature">
<img id="signPreview"><br>Principal Signature
</div>

<div class="bottombar">
<span id="sessionPreview">SESSION 2024-2025</span>
</div>

</div>

<script>

/* 15 Color Templates */
const colors=[
"#1e40af","#b91c1c","#047857","#7c3aed","#be185d",
"#0f172a","#78350f","#065f46","#111827","#991b1b",
"#0ea5e9","#f97316","#16a34a","#9333ea","#e11d48"
];

function preview(){

document.getElementById("schoolPreview").innerText=
document.getElementById("school").value;

document.getElementById("addressPreview").innerText=
document.getElementById("address").value;

document.getElementById("namePreview").innerText=
document.getElementById("name").value;

document.getElementById("fatherPreview").innerText=
document.getElementById("father").value;

document.getElementById("classPreview").innerText=
document.getElementById("class").value;

document.getElementById("sectionPreview").innerText=
document.getElementById("section").value;

document.getElementById("rollPreview").innerText=
document.getElementById("roll").value;

document.getElementById("phonePreview").innerText=
document.getElementById("phone").value;

document.getElementById("sessionPreview").innerText=
"SESSION "+document.getElementById("session").value;

/* Random Color Apply */
let randomColor=colors[Math.floor(Math.random()*colors.length)];
document.querySelector(".topbar").style.background=randomColor;
document.querySelector(".bottombar").style.background=randomColor;

loadImage("logoUpload","watermarkLogo");
loadImage("photoUpload","photoPreview");
loadImage("signUpload","signPreview");
}

function loadImage(inputId,imgId){
let file=document.getElementById(inputId).files[0];
if(file){
let reader=new FileReader();
reader.onload=function(e){
document.getElementById(imgId).src=e.target.result;
}
reader.readAsDataURL(file);
}
}

function downloadCard(){
html2canvas(document.getElementById("card"),{scale:3})
.then(function(canvas){
let img=canvas.toDataURL("image/png");
let win=window.open();
win.document.write("<img src='"+img+"' style='width:100%'>");
});
}

</script>

</body>
</html>
