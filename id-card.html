<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School ID Card Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

input,select{
width:260px;
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
margin:10px;
cursor:pointer;
}

.id-card{
width:360px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
margin:auto;
}

.header{
background:#1e3a8a;
color:white;
padding:10px;
}

.school-name{
font-size:22px;
font-weight:bold;
}

.address{
font-size:12px;
}

.phone{
font-size:12px;
}

.title{
font-weight:bold;
margin:10px;
}

.content{
display:flex;
justify-content:space-between;
padding:15px 20px;
}

.details{
text-align:left;
font-size:15px;
font-weight:bold;
line-height:30px;
}

.photoBox{
text-align:center;
}

.photo{
width:110px;
height:130px;
border:2px solid black;
object-fit:cover;
}

.sign{
width:90px;
margin-top:5px;
}

.footer{
background:#1e3a8a;
color:white;
font-weight:bold;
padding:8px;
margin-top:10px;
}

</style>
</head>

<body>

<h2>School ID Card Generator</h2>

<input id="school" placeholder="School Name"><br>
<input id="address" placeholder="School Address"><br>
<input id="phone" placeholder="School Phone"><br>
<input id="session" placeholder="Session"><br>
<input id="name" placeholder="Student Name"><br>
<input id="father" placeholder="Father Name"><br>
<input id="class" placeholder="Class"><br>
<input id="section" placeholder="Section"><br>
<input id="ph" placeholder="Phone Number"><br>

<br>

Student Photo  
<input type="file" id="photo"><br>

School Logo  
<input type="file" id="logo"><br>

Principal Signature  
<input type="file" id="sign"><br>

<br>

Color Template
<select id="color">
<option value="#1e3a8a">Blue</option>
<option value="#7c3aed">Purple</option>
<option value="#047857">Green</option>
<option value="#b91c1c">Red</option>
<option value="#d97706">Orange</option>
<option value="#be185d">Pink</option>
<option value="#374151">Dark Grey</option>
<option value="#0f766e">Teal</option>
<option value="#9333ea">Violet</option>
<option value="#2563eb">Royal Blue</option>
</select>

<br>

<button onclick="generate()">Preview</button>
<button onclick="download()">Download PNG</button>

<br><br>

<div id="card" class="id-card">

<div class="header" id="headerColor">

<div class="school-name" id="schoolPreview">School Name</div>
<div class="address" id="addressPreview">School Address</div>
<div class="phone" id="phonePreview">Phone</div>

</div>

<div class="title">IDENTITY CARD</div>

<div class="content">

<div class="details">
<div>Name : <span id="namePreview"></span></div>
<div>S/O D/O : <span id="fatherPreview"></span></div>
<div>Class : <span id="classPreview"></span></div>
<div>Section : <span id="sectionPreview"></span></div>
<div>Ph No : <span id="phPreview"></span></div>
</div>

<div class="photoBox">
<img id="photoPreview" class="photo">
<br>
<img id="signPreview" class="sign">
<div>Principal</div>
</div>

</div>

<div class="footer" id="footerColor">
SESSION <span id="sessionPreview"></span>
</div>

</div>

<script>

function generate(){

document.getElementById("schoolPreview").innerText =
document.getElementById("school").value;

document.getElementById("addressPreview").innerText =
document.getElementById("address").value;

document.getElementById("phonePreview").innerText =
document.getElementById("phone").value;

document.getElementById("sessionPreview").innerText =
document.getElementById("session").value;

document.getElementById("namePreview").innerText =
document.getElementById("name").value;

document.getElementById("fatherPreview").innerText =
document.getElementById("father").value;

document.getElementById("classPreview").innerText =
document.getElementById("class").value;

document.getElementById("sectionPreview").innerText =
document.getElementById("section").value;

document.getElementById("phPreview").innerText =
document.getElementById("ph").value;

let color=document.getElementById("color").value;

document.getElementById("headerColor").style.background=color;
document.getElementById("footerColor").style.background=color;

let photo=document.getElementById("photo").files[0];
let reader=new FileReader();
reader.onload=function(e){
document.getElementById("photoPreview").src=e.target.result;
}
if(photo) reader.readAsDataURL(photo);

let logo=document.getElementById("logo").files[0];
let reader2=new FileReader();
reader2.onload=function(e){
}
if(logo) reader2.readAsDataURL(logo);

let sign=document.getElementById("sign").files[0];
let reader3=new FileReader();
reader3.onload=function(e){
document.getElementById("signPreview").src=e.target.result;
}
if(sign) reader3.readAsDataURL(sign);

}

function download(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a");
link.download="school-id.png";
link.href=canvas.toDataURL();
link.click();

});

}

</script>

</body>
</html>
